name: ablation_loss_l1_fft
model_type: SRModel
scale: 2
num_gpu: 1
manual_seed: 42

datasets:
  train:
    name: DIV2K
    type: PairedImageDataset
    dataroot_gt: datasets/DIV2K/HR/Train
    dataroot_lq: datasets/DIV2K/LR_bicubic/Train/X2
    io_backend:
      type: disk
    gt_size: 128
    use_hflip: true
    use_rot: true
    dataset_enlarge_ratio: 1
    batch_size: 32
    num_workers: 8
    prefetch_mode: ~

  val:
    name: Set5
    type: PairedImageDataset
    dataroot_gt: datasets/Benchmarks/Set5/HR
    dataroot_lq: datasets/Benchmarks/Set5/LR_bicubic/X2
    io_backend:
      type: disk

# Loss ablation: L1 + FFT
network_g:
  type: LUMEN
  embed_dim: 32
  num_blocks: 8
  large_kernel: 17
  partial_ch: 8
  upscale: 2
  upsampler: pixelshuffledirect
  img_range: 1.0

path:
  experiments_root: experiments/ablation
  pretrain_network_g: ~
  strict_load_g: true
  resume_state: ~

train:
  ema_decay: 0.999
  optim_g:
    type: AdamW
    lr: !!float 2e-3
    weight_decay: !!float 5e-2
    betas: [0.9, 0.999]
  scheduler:
    type: CosineAnnealingRestartLR
    periods: [500000]
    restart_weights: [1]
    eta_min: !!float 1e-5
  total_iter: 500000
  warmup_iter: 5000
  pixel_opt:
    type: L1Loss
    loss_weight: 1.0
    reduction: mean
  fft_opt:
    type: FFTLoss
    loss_weight: 0.05

val:
  val_freq: !!float 5e3
  save_img: false
  metrics:
    psnr:
      type: calculate_psnr
      crop_border: 2
      test_y_channel: true
    ssim:
      type: calculate_ssim
      crop_border: 2
      test_y_channel: true

logger:
  print_freq: 100
  save_checkpoint_freq: !!float 5e3
  use_tb_logger: false

dist_params:
  backend: nccl
  port: 29500
