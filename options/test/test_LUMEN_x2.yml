name: LUMEN_x2
model_type: SRModel
scale: 2
num_gpu: 1
manual_seed: 42

datasets:
  test_1:
    name: Set5
    type: PairedImageDataset
    dataroot_gt: datasets/Benchmarks/Set5/HR
    dataroot_lq: datasets/Benchmarks/Set5/LR_bicubic/X2
    io_backend:
      type: disk
  test_2:
    name: Set14
    type: PairedImageDataset
    dataroot_gt: datasets/Benchmarks/Set14/HR
    dataroot_lq: datasets/Benchmarks/Set14/LR_bicubic/X2
    io_backend:
      type: disk
  test_3:
    name: BSDS100
    type: PairedImageDataset
    dataroot_gt: datasets/Benchmarks/BSDS100/HR
    dataroot_lq: datasets/Benchmarks/BSDS100/LR_bicubic/X2
    io_backend:
      type: disk
  test_4:
    name: Urban100
    type: PairedImageDataset
    dataroot_gt: datasets/Benchmarks/Urban100/HR
    dataroot_lq: datasets/Benchmarks/Urban100/LR_bicubic/X2
    io_backend:
      type: disk
  test_5:
    name: Manga109
    type: PairedImageDataset
    dataroot_gt: datasets/Benchmarks/Manga109/HR
    dataroot_lq: datasets/Benchmarks/Manga109/LR_bicubic/X2
    io_backend:
      type: disk

network_g:
  type: LUMEN
  embed_dim: 32
  num_blocks: 8
  large_kernel: 17
  partial_ch: 8
  upscale: 2
  upsampler: pixelshuffledirect
  img_range: 1.0

path:
  experiments_root: experiments
  pretrain_network_g: pretrained/LUMEN_x2.pth
  strict_load_g: true

val:
  save_img: false
  suffix: ~
  metrics:
    psnr:
      type: calculate_psnr
      crop_border: 2
      test_y_channel: true
    ssim:
      type: calculate_ssim
      crop_border: 2
      test_y_channel: true
